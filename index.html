function distance(lat1, lon1, lat2, lon2){
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)*Math.sin(dLat/2) +
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)*Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

async function geocoderCroisement(texte) {
  const separateurs = [' / ', '/', ' & ', '&'];
  let rue1 = null, rue2 = null;
  for(const sep of separateurs) {
    if(texte.includes(sep)) {
      const parts = texte.split(sep);
      rue1 = parts[0].trim();
      rue2 = parts[1] ? parts[1].trim() : null;
      break;
    }
  }

  if(rue1 && rue2) {
    try {
      const [r1, r2] = await Promise.all([
        fetch("https://nominatim.openstreetmap.org/search?format=json&limit=5&q=" + encodeURIComponent(rue1 + ", Bruxelles"), {headers:{"Accept-Language":"fr"}}),
        fetch("https://nominatim.openstreetmap.org/search?format=json&limit=5&q=" + encodeURIComponent(rue2 + ", Bruxelles"), {headers:{"Accept-Language":"fr"}})
      ]);
      const d1 = await r1.json();
      const d2 = await r2.json();
      if(d1.length > 0 && d2.length > 0) {
        let minDist = Infinity;
        let bestLat, bestLon;
        for(const a of d1) {
          for(const b of d2) {
            const d = distance(parseFloat(a.lat), parseFloat(a.lon), parseFloat(b.lat), parseFloat(b.lon));
            if(d < minDist) {
              minDist = d;
              bestLat = (parseFloat(a.lat) + parseFloat(b.lat)) / 2;
              bestLon = (parseFloat(a.lon) + parseFloat(b.lon)) / 2;
            }
          }
        }
        if(bestLat) return {lat: bestLat, lon: bestLon};
      }
    } catch(e) {}
  }

  try {
    const resp = await fetch("https://nominatim.openstreetmap.org/search?format=json&limit=1&q=" + encodeURIComponent(texte + ", Bruxelles"), {headers:{"Accept-Language":"fr"}});
    const data = await resp.json();
    if(data && data.length > 0) return {lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon)};
  } catch(e) {}

  return null;
}

async function trouverPreavis(){
  const ligne = document.getElementById("ligne").value;
  const dir = document.getElementById("direction").value;
  const croisement = document.getElementById("croisement").value.trim();
  const r = document.getElementById("resultat");
  const loading = document.getElementById("loading");

  r.style.display = "none";
  if(!ligne || !dir){ afficherErreur("Veuillez choisir une ligne et une direction."); return; }
  if(!croisement){ afficherErreur("Veuillez entrer un croisement."); return; }

  const parc = parcoursBus[ligne] && parcoursBus[ligne][dir];
  if(!parc || parc.length === 0){ afficherErreur("Parcours introuvable."); return; }

  loading.style.display = "block";
  const coords = await geocoderCroisement(croisement);
  loading.style.display = "none";

  if(!coords){ afficherErreur("Croisement introuvable. Essayez: Rue XX / Rue YY"); return; }

  const arretsParc = parc.map(function(nom){
    const a = arrets.find(x => x.nom.toUpperCase() === nom.toUpperCase());
    return { nom: nom, lat: a ? parseFloat(a.lat) : null, lon: a ? parseFloat(a.lon) : null };
  }).filter(a => a.lat !== null);

  if(arretsParc.length === 0){ afficherErreur("Aucun arrêt GPS trouvé."); return; }

  // Arrêt le plus proche = arrêt de préavis
  let minDist = Infinity;
  let idxPreavis = 0;
  arretsParc.forEach(function(a, i){
    const d = distance(coords.lat, coords.lon, a.lat, a.lon);
    if(d < minDist){ minDist = d; idxPreavis = i; }
  });

  const arretPreavis = arretsParc[idxPreavis];

  r.className = "ok";
  r.style.display = "block";
  r.innerHTML =
    "<b>Ligne " + ligne + " → " + dir + "</b><br><br>" +
    "🪧 Arrêt de préavis :<br>" +
    "<div id='preavis'>" + arretPreavis.nom + "</div>";
}

function afficherErreur(msg){
  const r = document.getElementById("resultat");
  r.className = "erreur";
  r.style.display = "block";
  r.innerHTML = "⚠️ " + msg;
}
